<script>
document.addEventListener("DOMContentLoaded", () => {

  // Data do início do namoro
  const startDate = new Date("2023-04-12T00:00:00");
  const today = new Date();

  // Zera horas (evita erro de fuso)
  startDate.setHours(0,0,0,0);
  today.setHours(0,0,0,0);

  // Diferença em dias (ajuste Google)
  const diffTime = today.getTime() - startDate.getTime();
  const daysTogether = Math.floor(diffTime / (1000 * 60 * 60 * 24)) - 5;

  // Elementos
  const counter = document.getElementById("days-count");
  const text = document.getElementById("days");

  // Proteção
  if (!counter) return;

  // 🔥 Animação suave
  let current = 0;
  const speed = Math.max(1, Math.floor(daysTogether / 80));

  const interval = setInterval(() => {
    current += speed;
    if (current >= daysTogether) {
      current = daysTogether;
      clearInterval(interval);
    }
    counter.innerText = current;
  }, 20);

  if (text) {
    text.innerText = " dias felizes ao seu lado ";
  }

});
</script>

<script>
  const hero = document.querySelector('.intro-inner');
  const char = document.querySelector('.intro-character');
  const blob = document.querySelector('.intro-blob');
  const canUseHover = window.matchMedia('(hover: hover) and (pointer: fine)').matches;

  if (hero && char && blob && canUseHover) {
    hero.addEventListener('mousemove', (e) => {
      const r = hero.getBoundingClientRect();
      const dx = (e.clientX - r.left) / r.width - 0.5;
      const dy = (e.clientY - r.top) / r.height - 0.5;

      char.style.transform = `translateX(-50%) translate(${dx*12}px, ${dy*10}px)`;
    });

    hero.addEventListener('mouseleave', () => {
      char.style.transform = `translateX(-50%)`;
      blob.style.transform = `scale(0.92)`;
    });
  }
</script>
